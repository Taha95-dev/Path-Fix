name: Test Pathfix Cross-Platform

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Verify Go Module Dependencies
        run: go mod tidy

      - name: Compile Code Validation
        run: go build -v ./...

      - name: Run Test Suite
        run: go test -v -parallel 4 ./...
